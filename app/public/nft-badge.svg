<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0505;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#991b1b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="384" fill="none" stroke="url(#border)" stroke-width="2" rx="4"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="368" height="368" fill="none" stroke="#7f1d1d" stroke-width="1" rx="2"/>
  <!-- Corner marks -->
  <text x="20" y="36" fill="#dc2626" font-size="14" font-family="monospace">✦</text>
  <text x="366" y="36" fill="#dc2626" font-size="14" font-family="monospace">✦</text>
  <text x="20" y="390" fill="#dc2626" font-size="14" font-family="monospace">✦</text>
  <text x="366" y="390" fill="#dc2626" font-size="14" font-family="monospace">✦</text>
  <!-- Top label -->
  <text x="200" y="65" text-anchor="middle" fill="#7f1d1d" font-size="11" font-family="monospace" letter-spacing="6">PROOF OF PRESENCE</text>
  <!-- Main title -->
  <text x="200" y="140" text-anchor="middle" fill="#dc2626" font-size="42" font-family="serif" letter-spacing="6" font-weight="bold">STRATA</text>
  <!-- Sigil / emblem -->
  <circle cx="200" cy="210" r="50" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <circle cx="200" cy="210" r="38" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="200" y="222" text-anchor="middle" fill="#dc2626" font-size="36" font-family="serif">⬡</text>
  <!-- Horizontal rules -->
  <line x1="40" y1="170" x2="155" y2="170" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="245" y1="170" x2="360" y2="170" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="40" y1="270" x2="360" y2="270" stroke="#7f1d1d" stroke-width="1"/>
  <!-- Bottom label -->
  <text x="200" y="305" text-anchor="middle" fill="#9ca3af" font-size="12" font-family="monospace" letter-spacing="3">ON-CHAIN ATTENDANCE</text>
  <text x="200" y="330" text-anchor="middle" fill="#6b7280" font-size="10" font-family="monospace" letter-spacing="2">DEVNET · SOLANA</text>
  <!-- Bottom fine print -->
  <text x="200" y="370" text-anchor="middle" fill="#374151" font-size="9" font-family="monospace" letter-spacing="1">strata-project.vercel.app</text>
</svg>
